<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherNow</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="https://openweathermap.org/img/wn/01d.png" />
  <script defer src="script.js"></script>
</head>
<body>
  <!-- Dynamic Weather Background -->
  <div id="weather-animation">
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="rain"></div>
    <div class="lightning"></div>
  </div>

  <div class="container">
    <header>
      <div class="location">
        <h1 id="cityName">Loading...</h1>
      </div>
      <div class="controls">
        <button id="themeToggle" title="Toggle Theme">🌓</button>
        <select id="unitToggle">
          <option value="metric">°C</option>
          <option value="imperial">°F</option>
        </select>
      </div>
    </header>

    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="Search city..." />
      <button id="searchBtn">🔍</button>
    </div>

    <div id="loader" class="loader hidden"></div>

    <!-- Current Weather - Samsung Style -->
    <section id="currentWeather" class="current-weather hidden"></section>

    <!-- Forecast -->
    <section id="forecast" class="forecast hidden">
      <h2>5-Day Forecast</h2>
      <div id="forecastCards" class="forecast-cards"></div>
    </section>

    <footer>
      <p>Made by Sajidali Momin</p>
    </footer>
  </div>
</body>
</html>
