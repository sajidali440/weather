<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherNow</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="https://openweathermap.org/img/wn/01d.png" />
  <script defer src="script.js"></script>
</head>
<body>
  <!-- Animated Weather Background -->
  <div id="weather-animation">
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="rain"></div>
    <div class="lightning"></div>
  </div>

  <div class="container">
    <header>
      <h1>🌤 WeatherNow</h1>
      <div class="controls">
        <button id="themeToggle" title="Toggle Dark/Light Mode">🌓</button>
        <select id="unitToggle" title="Temperature Unit">
          <option value="metric">°C</option>
          <option value="imperial">°F</option>
        </select>
      </div>
    </header>

    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="Enter a city..." />
      <button id="searchBtn" title="Search">🔍</button>
    </div>

    <div id="loader" class="loader hidden"></div>

    <section id="currentWeather" class="card hidden"></section>

    <section id="forecast" class="forecast hidden">
      <h2>5-Day Forecast</h2>
      <div id="forecastCards" class="forecast-cards"></div>
    </section>

    <footer>
      <p>Made by <strong>Sajidali Momin</strong> | <a href="https://github.com/sajidali440" target="_blank">GitHub</a></p>
    </footer>
  </div>
  <div class="weather-card">
  <h2>Anand, IN</h2>
  
  <!-- Weather Visual -->
  <div class="weather-icon-container">
    <div class="sky-icon"></div> 
    <p class="weather-desc"><strong>Clear</strong> - clear sky</p>
  </div>

  <!-- Weather Stats Grid -->
  <ul class="weather-details">
    <li><span>Temperature:</span> <strong>38.94°C</strong></li>
    <li><span>Feels Like:</span> <strong>41.13°C</strong></li>
    <li><span>Humidity:</span> <strong>30%</strong></li>
    <li><span>Wind:</span> <strong>7.83 m/s</strong></li>
    <li><span>Pressure:</span> <strong>1005 hPa</strong></li>
    <li><span>Sunrise:</span> <strong>5:53 AM</strong></li>
    <li><span>Sunset:</span> <strong>7:17 PM</strong></li>
  </ul>
</div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("✅ Service Worker Registered"))
        .catch(err => console.error("Service Worker registration failed:", err));
    }
  </script>
</body>
</html>
